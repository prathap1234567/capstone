<div class="transfer-page">

  <div class="container py-5">

    <div class="row justify-content-center">

      <div class="col-12 col-lg-8">

        <div class="d-flex justify-content-between align-items-center mb-4">

          <div>
            <h2 class="text-white fw-bold mb-1">Transfer Money</h2>
            <p class="text-light mb-0">
              Send money securely to your saved payees
            </p>
          </div>

          <span class="badge bg-success rounded-pill px-3 py-2">
            Secure Transfer
          </span>

        </div>

        <div class="card transfer-card shadow-lg border-0 rounded-4">

          <div class="card-body p-4">

            <div class="mb-4">
              <label class="form-label">From Account</label>
              <input
                type="text"
                class="form-control"
                [value]="accountNumber"
                readonly>
            </div>

            <form [formGroup]="transferForm">

              <div class="mb-3">
                <label class="form-label">Select Payee</label>

                <select
                  class="form-control"
                  formControlName="toAccount">

                  <option value="">Select Payee</option>

                  <option
                    *ngFor="let payee of payees"
                    [value]="payee.payeeAccountNumber">
                    {{payee.payeeName}} - {{payee.payeeAccountNumber}}
                  </option>

                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Amount</label>

                <input
                  class="form-control"
                  type="number"
                  formControlName="amount"
                  placeholder="Enter amount">
              </div>

              <div class="mb-4">
                <label class="form-label">Remarks</label>

                <input
                  class="form-control"
                  type="text"
                  formControlName="remarks"
                  placeholder="Enter remarks">
              </div>

              <button
                type="button"
                class="btn btn-success w-100"
                (click)="transferMoney()">
                Transfer Money
              </button>

            </form>

            <div
              *ngIf="message"
              class="alert alert-info mt-3 mb-0 rounded-3">
              {{message}}
            </div>

          </div>

        </div>

        <div class="text-center mt-4">

          <button
            class="btn btn-outline-light rounded-pill px-5 py-2"
            routerLink="/userdashboard">
             Back 
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
